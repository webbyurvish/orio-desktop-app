name: Build and release Desktop App (Windows)

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore "./AiInterviewAssistant.csproj"

      - name: Publish (win-x64)
        run: >
          dotnet publish "./AiInterviewAssistant.csproj"
          -c Release
          -r win-x64
          --self-contained true
          -o "./publish"
          -p:PublishReadyToRun=true
          -p:DebugType=None

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (setup.exe)
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^desktop-v',''
          if ([string]::IsNullOrWhiteSpace($ver)) { $ver = "1.0.0" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" ".\installer\orio-desktop.iss" "/DAppVersion=$ver"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/orio-desktop-setup.exe
